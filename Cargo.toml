[package]
name = "tiny-trie"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
rand = "0.9"
clap = { version = "4.6.1", features = ["derive"] }
arrayvec = "0.7.6"

[lib]
path = "src/lib.rs"

[[bin]]
name = "trie-stats"
path = "src/main.rs"

[[bin]]
name = "bencher"
path = "src/bin/bench.rs"

[features]
archive = []


